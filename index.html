<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<meta name="description" content="Gestión de turnos — Residencia Santa Llúcia, Dénia">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Turno Concilia">
<title>Turno Concilia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --green:#3B6D11;--green-light:#EAF3DE;
  --pink:#993556;--pink-light:#FBEAF0;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --gray:#5F5E5A;--gray-light:#F1EFE8;
  --bg:#F5F5F3;--white:#FFFFFF;
  --border:rgba(0,0,0,0.1);--text:#2C2C2A;--text-muted:#888780;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:70px}

/* TOPBAR */
.topbar{background:var(--teal-dark);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:11px;opacity:.8;margin-top:1px}
.topbar-user{font-size:12px;opacity:.9}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:white;padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;font-size:10px;color:var(--text-muted);cursor:pointer;border:none;background:none;gap:3px;transition:color .15s}
.nav-item.active{color:var(--teal-dark)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* PAGES */
.page{display:none;padding:16px}
.page.active{display:block}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* LOGIN */
#page-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--white)}
.login-logo{width:64px;height:64px;background:var(--teal-dark);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.login-logo svg{width:36px;height:36px;stroke:white;fill:none;stroke-width:1.8}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;text-align:center}
.form-group{width:100%;max-width:360px;margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--teal)}
.btn-primary{width:100%;max-width:360px;padding:12px;background:var(--teal-dark);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-primary:hover{background:var(--teal)}
.login-error{color:var(--red);font-size:12px;margin-top:8px;text-align:center;max-width:360px}
.login-demo{margin-top:20px;font-size:12px;color:var(--text-muted);text-align:center;max-width:360px}
.demo-btn{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;color:var(--text);margin-top:6px}
.demo-badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}

/* CUADRANTE */
.mes-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mes-nav button{width:32px;height:32px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center}
.mes-nav button svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mes-titulo{font-size:15px;font-weight:600}
.leyenda{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.leyenda-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.leyenda-dot{width:10px;height:10px;border-radius:3px}
.cuadrante-wrap{overflow-x:auto;border-radius:var(--radius);border:0.5px solid var(--border)}
.cuadrante-tabla{border-collapse:collapse;font-size:11px;min-width:100%;background:var(--white)}
.cuadrante-tabla th{background:var(--gray-light);padding:5px 4px;text-align:center;font-weight:600;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);white-space:nowrap;font-size:10px;color:var(--gray)}
.cuadrante-tabla th.col-nombre{text-align:left;padding-left:10px;min-width:90px;position:sticky;left:0;z-index:2;background:var(--gray-light)}
.cuadrante-tabla td{padding:3px 2px;text-align:center;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);min-width:30px}
.cuadrante-tabla td.nombre-cel{text-align:left;padding-left:10px;font-weight:500;white-space:nowrap;font-size:11px;position:sticky;left:0;background:var(--white);z-index:1}
.cuadrante-tabla tr:last-child td{border-bottom:none}
.cuadrante-tabla tr.fila-propia td{background:#F0FBF7!important}
.cuadrante-tabla tr.fila-propia td.nombre-cel{background:#E1F5EE!important}
.turno-pill{display:inline-block;padding:2px 3px;border-radius:3px;font-size:9px;font-weight:600;min-width:24px;text-align:center}
.t-M{background:var(--teal-light);color:var(--teal-dark)}
.t-CD{background:var(--green-light);color:var(--green)}
.t-T{background:var(--amber-light);color:var(--amber)}
.t-TC{background:var(--pink-light);color:var(--pink)}
.t-N{background:var(--purple-light);color:var(--purple)}
.t-L{background:var(--gray-light);color:var(--gray)}
.t-F{background:var(--gray-light);color:var(--gray)}
.t-AP{background:var(--blue-light);color:var(--blue)}
.t-P{background:var(--blue-light);color:var(--blue)}
.t-HE{background:var(--red-light);color:var(--red)}
.t-DH{background:var(--blue-light);color:var(--blue)}
.t-IT{background:var(--red-light);color:var(--red)}
.t-VAC{background:var(--green-light);color:var(--green)}
.col-findes{background:#FAFAF8}
.col-hoy{background:#FFF8E6!important}

/* SM */
.sm-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.sm-row:last-child{border-bottom:none}
.sm-num{font-weight:600;font-size:14px}
.estado-ok{color:var(--teal-dark)}
.estado-warn{color:var(--amber)}
.estado-red{color:var(--red)}
.dot-ok{width:8px;height:8px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:4px}
.dot-red{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-right:4px}

/* SOLICITUDES */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab-btn{flex:1;padding:7px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;background:var(--white);color:var(--text-muted);font-weight:500;transition:all .15s}
.tab-btn.active{background:var(--teal-dark);color:white;border-color:var(--teal-dark)}
.solicitud-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.solicitud-item:last-child{border-bottom:none}
.sol-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sol-info{flex:1;min-width:0}
.sol-nombre{font-size:13px;font-weight:500}
.sol-detalle{font-size:11px;color:var(--text-muted);margin-top:2px}
.sol-actions{display:flex;gap:6px;margin-top:6px}
.btn-accept{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--teal-light);color:var(--teal-dark)}
.btn-reject{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--red-light);color:var(--red)}
.badge-estado{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-pendiente{background:var(--amber-light);color:var(--amber)}
.badge-aprobada{background:var(--teal-light);color:var(--teal-dark)}
.badge-vetada{background:var(--red-light);color:var(--red)}

/* PERFIL */
.perfil-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.perfil-avatar{width:56px;height:56px;border-radius:50%;background:var(--teal-light);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.perfil-nombre{font-size:17px;font-weight:600}
.perfil-rol{font-size:12px;color:var(--text-muted);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg);border-radius:var(--radius-sm);padding:10px 6px;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:2px}

/* LOADING */
.loading{text-align:center;padding:32px;color:var(--text-muted);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login">
  <div class="login-logo">
    <svg viewBox="0 0 24 24"><path d="M8 6v6m0 0v6m0-6h8M8 12H4"/><rect x="2" y="3" width="20" height="18" rx="3"/></svg>
  </div>
  <div class="login-title">Turno Concilia</div>
  <div class="login-sub">Residencia Santa Llúcia · Dénia</div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="login-email" placeholder="tu@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input class="form-input" type="password" id="login-pass" placeholder="••••••••">
  </div>
  <button class="btn-primary" onclick="doLogin()">Entrar</button>
  <div id="login-error" class="login-error" style="display:none"></div>
  <div class="login-demo">
    <div style="margin-bottom:6px">— Acceso demo —</div>
    <button class="demo-btn" onclick="loginDemo('superadmin')">
      <span class="demo-badge" style="background:#EEEDFE;color:#3C3489">Superadmin</span>Admin General
    </button>
    <button class="demo-btn" onclick="loginDemo('coordinadora')">
      <span class="demo-badge" style="background:#E1F5EE;color:#085041">Coordinadora</span>Coordinadora
    </button>
    <button class="demo-btn" onclick="loginDemo('auxiliar')">
      <span class="demo-badge" style="background:#FAEEDA;color:#633806">Auxiliar</span>INMA SOLER
    </button>
  </div>
</div>

<!-- APP -->
<div id="app-shell" style="display:none">
  <div class="topbar">
    <div>
      <div class="topbar-title">Turno Concilia</div>
      <div class="topbar-sub">Residencia Santa Llúcia</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- CUADRANTE -->

      <button onclick="cambiarMes(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>

            <option value="VAC">Vacaciones</option>
            <option value="DH">Devolución de horas (DH)</option>

            <label class="form-label">Fecha fin</label>

        <button class="btn-primary" onclick="enviarSolicitud()">Enviar solicitud</button>
      </div>
    </div>
  </div>

  <!-- PERFIL -->
  <div class="page" id="page-perfil">
    <div class="card">
      <div class="perfil-header">
        <div class="perfil-avatar" id="perfil-avatar"></div>
        <div>

          <div class="perfil-rol" id="perfil-rol"></div>
        </div>
      </div>
      <div class="stats-grid" id="perfil-stats"></div>
    </div>
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Bolsa de horas extra</div>

    </div>

  <nav class="bottom-nav">

    </button>
    <button class="nav-item" id="nav-perfil" onclick="showPage('perfil')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi perfil
    </button>
  </nav>
</div>

let currentUser = null;
let mesActual = 0;
let anioActual = 2026;
let trabajadoras = [];
let cuadranteCache = {};

function claseColor(cod) {
  if (!cod) return 't-L';
  if (cod.startsWith('M')) return 't-M';
  if (cod.startsWith('CD')) return 't-CD';
  if (cod.startsWith('TC') || cod.startsWith('CT')) return 't-TC';
  if (cod.startsWith('T')) return 't-T';
  if (cod === 'N' || cod === 'N1') return 't-N';
  const mapa = {L:'t-L',F:'t-F',AP:'t-AP',P:'t-P',HE:'t-HE',DH:'t-DH',IT:'t-IT',VAC:'t-VAC'};
  return mapa[cod] || 't-L';
}

// LOGIN
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = 'Email o contraseña incorrectos'; err.style.display = 'block'; return; }
  await cargarSesion();
}

// LOGIN DEMO (sin Supabase Auth, carga directamente de la tabla)
async function loginDemo(tipo) {
  const emails = { superadmin:'admin@santallucia.es', coordinadora:'coordinadora@santallucia.es', auxiliar:'inma.soler@santallucia.es' };
  const { data } = await sb.from('trabajadoras').select('*').eq('email', emails[tipo]).single();
  if (data) {
    currentUser = data;
    iniciarApp();
  }
}

async function cargarSesion() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const { data } = await sb.from('trabajadoras').select('*').eq('auth_id', user.id).single();
  if (data) { currentUser = data; iniciarApp(); }
}

function doLogout() {
  sb.auth.signOut();
  currentUser = null;
  cuadranteCache = {};
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
}

async function iniciarApp() {
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  document.getElementById('topbar-user').textContent = currentUser.nick;
  await cargarTrabajadoras();
  renderCuadrante();
  renderSM();
  renderSolicitudes();
  cargarPerfil();
}

async function cargarTrabajadoras() {
  const { data } = await sb.from('trabajadoras').select('id,nick,nombre,rol').eq('activa', true).eq('en_cuadrante', true).order('nick');
  if (data) {
    trabajadoras = data;
    const sel = document.getElementById('sol-contraparte');
    sel.innerHTML = '<option value="">Selecciona compañera...</option>';
    data.filter(t => t.id !== currentUser.id).forEach(t => {
      const o = document.createElement('option');
      o.value = t.id; o.textContent = t.nick;
      sel.appendChild(o);
    });
  }
}

// CUADRANTE
function diasEnMes(m, a) { return new Date(a, m+1, 0).getDate(); }
function diaSemana(a, m, d) { return new Date(a, m, d).getDay(); }
function esFinde(a, m, d) { const ds = diaSemana(a,m,d); return ds===0||ds===6; }

async function renderCuadrante() {
  document.getElementById('mes-titulo').textContent = MESES[mesActual] + ' ' + anioActual;
  const container = document.getElementById('cuadrante-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando cuadrante...</div>';

  const total = diasEnMes(mesActual, anioActual);
  const fechaIni = `${anioActual}-${String(mesActual+1).padStart(2,'0')}-01`;
  const fechaFin = `${anioActual}-${String(mesActual+1).padStart(2,'0')}-${String(total).padStart(2,'0')}`;
  const cacheKey = `${anioActual}-${mesActual}`;

  let filas = {};

  // Intentar cargar de Supabase
  const { data: dbData } = await sb.from('cuadrante')
    .select('trabajadora_id, fecha, codigo_turno, incidencia, trabajadoras!cuadrante_trabajadora_id_fkey(nick)')
    .gte('fecha', fechaIni).lte('fecha', fechaFin);

  if (dbData && dbData.length > 0) {
    dbData.forEach(r => {
      const nick = r.trabajadoras?.nick || '';
      if (!filas[nick]) filas[nick] = {};
      const dia = parseInt(r.fecha.split('-')[2]);
      filas[nick][dia] = r.incidencia || r.codigo_turno || '';
    });
  }

  const hoy = new Date();
  const esHoy = (d) => hoy.getFullYear()===anioActual && hoy.getMonth()===mesActual && hoy.getDate()===d;

  let html = '<div class="cuadrante-wrap"><table class="cuadrante-tabla"><thead><tr><th class="col-nombre">Auxiliar</th>';
  for (let d=1; d<=total; d++) {
    const ds = diaSemana(anioActual, mesActual, d);
    html += `<th class="${esFinde(anioActual,mesActual,d)?'col-findes':''} ${esHoy(d)?'col-hoy':''}">${DIAS_SEMANA[ds]}<br>${d}</th>`;
  }
  html += '</tr></thead><tbody>';

  const nicks = trabajadoras.map(t=>t.nick);
  nicks.forEach(nick => {
    const esMia = currentUser && currentUser.nick === nick;
    html += `<tr${esMia?' class="fila-propia"':''}>`;
    html += `<td class="nombre-cel">${nick}</td>`;
    for (let d=1; d<=total; d++) {
      const cod = (filas[nick] && filas[nick][d]) || '';
      const cls = claseColor(cod);
      html += `<td class="${esFinde(anioActual,mesActual,d)?'col-findes':''} ${esHoy(d)?'col-hoy':''}">`;
      if (cod) html += `<span class="turno-pill ${cls}">${cod}</span>`;
      html += '</td>';
    }
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function cambiarMes(delta) {
  mesActual += delta;
  if (mesActual < 0) { mesActual = 11; anioActual--; }
  if (mesActual > 11) { mesActual = 0; anioActual++; }
  renderCuadrante();
}

// SERVICIOS MÍNIMOS
function renderSM() {
  const hoy = new Date();
  const diasSem = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const fe = [0,6].includes(hoy.getDay());
  const smM = fe?8:11; const smT = fe?6:7;
  const efM = fe?8:12; const efT = fe?6:7;

  function fila(lbl, ef, min) {
    const ok = ef>=min;
    return `<div class="sm-row">
      <span><span class="${ok?'dot-ok':'dot-red'}"></span>${lbl}</span>
      <span class="sm-num ${ok?'estado-ok':'estado-red'}">${ef}/${min}</span>
    </div>`;
  }

  document.getElementById('sm-hoy').innerHTML =
    `<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">${diasSem[hoy.getDay()]}, ${hoy.getDate()} de ${MESES[hoy.getMonth()]}</div>
    ${fila('Mañana',efM,smM)}${fila('Tarde',efT,smT)}${fila('Noche',1,1)}`;

  let html = '';
  for (let i=0; i<7; i++) {
    const f = new Date(hoy); f.setDate(hoy.getDate()+i);
    const fe2 = [0,6].includes(f.getDay());
    const mMin=fe2?8:11; const tMin=fe2?6:7;
    const mEf=fe2?8:12; const tEf=fe2?6:7;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <span>${diasSem[f.getDay()].slice(0,3)} ${f.getDate()}</span>
      <span>
        <span class="${mEf>=mMin?'estado-ok':'estado-red'}" style="margin-right:8px">M ${mEf}/${mMin}</span>
        <span class="${tEf>=tMin?'estado-ok':'estado-red'}" style="margin-right:8px">T ${tEf}/${tMin}</span>
        <span class="estado-ok">N 1/1</span>
      </span>
    </div>`;
  }
  document.getElementById('sm-semana').innerHTML = html;
}

// SOLICITUDES
async function renderSolicitudes() {
  const { data } = await sb.from('solicitudes')
    .select('*, solicitante:solicitante_id(nick), contraparte:contraparte_id(nick)')
    .order('created_at', { ascending: false });

  const pendientes = (data||[]).filter(s=>s.estado==='pendiente');
  const esCoord = currentUser && ['coordinadora','superadmin'].includes(currentUser.rol);

  let html = '';
  if (pendientes.length === 0) {
    html = '<div class="empty-state">Sin solicitudes pendientes</div>';
  } else {
    pendientes.forEach(s => {
      const ini = (s.solicitante?.nick||'').split(' ').map(w=>w[0]).join('').slice(0,2);
      html += `<div class="solicitud-item">
        <div class="sol-avatar" style="background:var(--teal-light);color:var(--teal-dark)">${ini}</div>
        <div class="sol-info">
          <div class="sol-nombre">${s.solicitante?.nick} · <span style="font-weight:400;color:var(--text-muted)">${s.tipo}</span></div>
          <div class="sol-detalle">${s.fecha_desde}${s.fecha_hasta!==s.fecha_desde?' → '+s.fecha_hasta:''}</div>
          ${s.motivo?`<div class="sol-detalle">${s.motivo}</div>`:''}
          ${esCoord?`<div class="sol-actions">
            <button class="btn-accept" onclick="resolverSol('${s.id}','aprobada')">Aprobar</button>
            <button class="btn-reject" onclick="resolverSol('${s.id}','vetada')">Vetar</button>
          </div>`:'<div class="sol-detalle" style="margin-top:4px">Pendiente de coordinadora</div>'}
        </div>
      </div>`;
    });
  }
  document.getElementById('sol-pendientes').innerHTML = html;

  const mias = (data||[]).filter(s=>s.solicitante_id===currentUser.id);
  let miHtml = mias.length===0 ? '<div class="empty-state">No tienes solicitudes</div>' : '';
  mias.forEach(s => {
    miHtml += `<div class="solicitud-item">
      <div class="sol-info">
        <div class="sol-nombre">${s.tipo}</div>
        <div class="sol-detalle">${s.fecha_desde}${s.fecha_hasta!==s.fecha_desde?' → '+s.fecha_hasta:''}</div>
      </div>
      <span class="badge-estado badge-${s.estado}">${s.estado}</span>
    </div>`;
  });
  document.getElementById('sol-mis').innerHTML = miHtml;

  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('sol-fecha-ini').value = hoy;
  document.getElementById('sol-fecha-fin').value = hoy;
}

async function resolverSol(id, estado) {
  await sb.from('solicitudes').update({ estado, resuelta_por: currentUser.id, resuelta_en: new Date().toISOString() }).eq('id', id);
  renderSolicitudes();
}

async function enviarSolicitud() {
  const tipo = document.getElementById('sol-tipo').value;
  const desde = document.getElementById('sol-fecha-ini').value;
  const hasta = document.getElementById('sol-fecha-fin').value;
  const motivo = document.getElementById('sol-motivo').value;
  const contraparte = document.getElementById('sol-contraparte').value;
  const { error } = await sb.from('solicitudes').insert({
    solicitante_id: currentUser.id, tipo, fecha_desde: desde, fecha_hasta: hasta,
    motivo: motivo||null, contraparte_id: contraparte||null
  });
  if (!error) { alert('✓ Solicitud enviada correctamente'); renderSolicitudes(); switchSolTab('mis', document.querySelectorAll('.tab-btn')[1]); }
  else alert('Error al enviar la solicitud. Inténtalo de nuevo.');
}

function switchSolTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sol-pendientes').style.display = tab==='pendientes'?'block':'none';
  document.getElementById('sol-mis').style.display = tab==='mis'?'block':'none';
  document.getElementById('sol-nueva').style.display = tab==='nueva'?'block':'none';
}

// PERFIL
async function cargarPerfil() {
  if (!currentUser) return;
  const ini = currentUser.nick.split(' ').map(w=>w[0]).join('').slice(0,2);
  document.getElementById('perfil-avatar').textContent = ini;
  document.getElementById('perfil-nombre').textContent = currentUser.nombre;
  document.getElementById('perfil-rol').textContent = currentUser.rol.charAt(0).toUpperCase()+currentUser.rol.slice(1)+' · Auxiliar de enfermería';

  // Contar turnos de enero desde los datos
  // Contar turnos del mes actual desde Supabase
  const hoy = new Date();
  const mesIni = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-01`;
  const mesFin = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate()).padStart(2,'0')}`;
  const { data: statData } = await sb.from('cuadrante')
    .select('codigo_turno, incidencia')
    .eq('trabajadora_id', currentUser.id)
    .gte('fecha', mesIni).lte('fecha', mesFin);

  let M=0, T=0, N=0;
  (statData||[]).forEach(r => {
    const c = r.incidencia || r.codigo_turno || '';
    if (c.startsWith('M')||c.startsWith('CD')) M++;
    else if (c.startsWith('T')||c.startsWith('TC')||c.startsWith('CT')) T++;
    else if (c==='N'||c==='N1') N++;
  });

  document.getElementById('perfil-stats').innerHTML = `
    <div class="stat-box"><div class="stat-num" style="color:#1D9E75">${M}</div><div class="stat-lbl">Mañanas</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#BA7517">${T}</div><div class="stat-lbl">Tardes</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#534AB7">${N}</div><div class="stat-lbl">Noches</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#A32D2D">0</div><div class="stat-lbl">HE pend.</div></div>`;

  const { data: heData } = await sb.from('bolsa_he').select('*').eq('trabajadora_id', currentUser.id).eq('destino','pendiente');
  document.getElementById('he-lista').innerHTML = (!heData||heData.length===0)
    ? '<div class="empty-state">Sin horas extra pendientes</div>'
    : heData.map(h=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px">
        <span>${h.fecha} · ${h.origen}</span><span style="font-weight:600;color:var(--red)">${h.horas}h</span>
      </div>`).join('');
}

function showPage(nombre) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+nombre).classList.add('active');
  document.getElementById('nav-'+nombre).classList.add('active');
}

  const { data: { session } } = await sb.auth.getSession();

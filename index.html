<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<meta name="description" content="Gestión de turnos — Residencia Santa Llúcia, Dénia">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Turno Concilia">
<title>Turno Concilia</title>
<style>
  :root {
    --teal:       #1D9E75;
    --teal-dark:  #0F6E56;
    --teal-light: #E1F5EE;
    --amber:      #BA7517;
    --amber-light:#FAEEDA;
    --purple:     #534AB7;
    --purple-light:#EEEDFE;
    --green:      #3B6D11;
    --green-light:#EAF3DE;
    --pink:       #993556;
    --pink-light: #FBEAF0;
    --red:        #A32D2D;
    --red-light:  #FCEBEB;
    --blue:       #185FA5;
    --blue-light: #E6F1FB;
    --gray:       #5F5E5A;
    --gray-light: #F1EFE8;
    --bg:         #F5F5F3;
    --white:      #FFFFFF;
    --border:     rgba(0,0,0,0.1);
    --text:       #2C2C2A;
    --text-muted: #888780;
    --radius:     10px;
    --radius-sm:  6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 70px;
  }

  /* TOPBAR */
  .topbar {
    background: var(--teal-dark);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; flex-direction: column; }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: .2px; }
  .topbar-sub { font-size: 11px; opacity: .8; margin-top: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-user { font-size: 12px; opacity: .9; }
  .btn-logout {
    background: rgba(255,255,255,.15);
    border: none;
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 0.5px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px;
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    gap: 3px;
    transition: color .15s;
  }
  .nav-item.active { color: var(--teal-dark); }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* LOGIN */
  #page-login {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    background: var(--white);
  }
  .login-logo {
    width: 64px; height: 64px;
    background: var(--teal-dark);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .login-logo svg { width: 36px; height: 36px; stroke: white; fill: none; stroke-width: 1.8; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; text-align: center; }
  .form-group { width: 100%; max-width: 360px; margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .4px; }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus { border-color: var(--teal); }
  .btn-primary {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    background: var(--teal-dark);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--teal); }
  .login-demo { margin-top: 20px; font-size: 12px; color: var(--text-muted); text-align: center; max-width: 360px; }
  .demo-users { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; width: 100%; max-width: 360px; }
  .demo-btn {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .demo-badge {
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }

  /* CUADRANTE */
  .mes-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mes-nav button {
    width: 32px; height: 32px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .mes-nav button svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .mes-titulo { font-size: 15px; font-weight: 600; }

  .leyenda {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .leyenda-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .leyenda-dot { width: 10px; height: 10px; border-radius: 3px; }

  .cuadrante-wrap { overflow-x: auto; border-radius: var(--radius); border: 0.5px solid var(--border); }
  .cuadrante-tabla {
    border-collapse: collapse;
    font-size: 11px;
    min-width: 100%;
    background: var(--white);
  }
  .cuadrante-tabla th {
    background: var(--gray-light);
    padding: 5px 4px;
    text-align: center;
    font-weight: 600;
    border-right: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
    font-size: 10px;
    color: var(--gray);
    position: sticky;
    top: 0;
  }
  .cuadrante-tabla th.col-nombre {
    text-align: left;
    padding-left: 10px;
    min-width: 90px;
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--gray-light);
  }
  .cuadrante-tabla td {
    padding: 3px 2px;
    text-align: center;
    border-right: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    min-width: 30px;
  }
  .cuadrante-tabla td.nombre-cel {
    text-align: left;
    padding-left: 10px;
    font-weight: 500;
    white-space: nowrap;
    font-size: 11px;
    position: sticky;
    left: 0;
    background: var(--white);
    z-index: 1;
  }
  .cuadrante-tabla tr:last-child td { border-bottom: none; }
  .cuadrante-tabla tr.fila-propia td { background: #F0FBF7 !important; }
  .cuadrante-tabla tr.fila-propia td.nombre-cel { background: #E1F5EE !important; }

  .turno-pill {
    display: inline-block;
    padding: 2px 3px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    min-width: 24px;
    text-align: center;
    cursor: pointer;
    transition: opacity .1s;
  }
  .turno-pill:hover { opacity: .75; }

  /* Colores de turno */
  .t-M  { background: var(--teal-light);   color: var(--teal-dark); }
  .t-CD { background: var(--green-light);  color: var(--green); }
  .t-T  { background: var(--amber-light);  color: var(--amber); }
  .t-TC { background: var(--pink-light);   color: var(--pink); }
  .t-N  { background: var(--purple-light); color: var(--purple); }
  .t-L  { background: var(--gray-light);   color: var(--gray); }
  .t-F  { background: var(--gray-light);   color: var(--gray); }
  .t-AP { background: var(--blue-light);   color: var(--blue); }
  .t-P  { background: var(--blue-light);   color: var(--blue); }
  .t-HE { background: var(--red-light);    color: var(--red); }
  .t-DH { background: var(--blue-light);   color: var(--blue); }
  .t-IT { background: var(--red-light);    color: var(--red); }
  .t-VAC{ background: var(--green-light);  color: var(--green); }

  .col-findes { background: #FAFAF8; }
  .col-hoy { background: #FFF8E6 !important; }

  /* SERVICIOS MÍNIMOS */
  .sm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .sm-card {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .sm-header { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .sm-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .sm-row:last-child { border-bottom: none; }
  .sm-num { font-weight: 600; font-size: 14px; }
  .estado-ok   { color: var(--teal-dark); }
  .estado-warn { color: var(--amber); }
  .estado-red  { color: var(--red); }
  .dot-ok   { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); display: inline-block; margin-right: 4px; }
  .dot-warn { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); display: inline-block; margin-right: 4px; }
  .dot-red  { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 4px; }

  /* SOLICITUDES */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn {
    flex: 1;
    padding: 7px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    background: var(--white);
    color: var(--text-muted);
    font-weight: 500;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--teal-dark); color: white; border-color: var(--teal-dark); }

  .solicitud-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .solicitud-item:last-child { border-bottom: none; }
  .sol-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }
  .sol-info { flex: 1; min-width: 0; }
  .sol-nombre { font-size: 13px; font-weight: 500; }
  .sol-detalle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sol-actions { display: flex; gap: 6px; margin-top: 6px; }
  .btn-accept { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; background: var(--teal-light); color: var(--teal-dark); }
  .btn-reject { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; background: var(--red-light); color: var(--red); }
  .badge-estado {
    padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
    white-space: nowrap;
  }
  .badge-pendiente { background: var(--amber-light); color: var(--amber); }
  .badge-aprobada  { background: var(--teal-light);  color: var(--teal-dark); }
  .badge-vetada    { background: var(--red-light);   color: var(--red); }

  /* PERFIL */
  .perfil-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 16px;
  }
  .perfil-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--teal-light);
    color: var(--teal-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    flex-shrink: 0;
  }
  .perfil-nombre { font-size: 17px; font-weight: 600; }
  .perfil-rol { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .he-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .he-item:last-child { border-bottom: none; }

  /* NOTIFICACIONES */
  .notif-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .notif-nueva { background: var(--teal); }
  .notif-leida { background: var(--border); }
  .notif-text { font-size: 13px; line-height: 1.4; }
  .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; }
  .empty-state svg { width: 40px; height: 40px; stroke: var(--border); fill: none; stroke-width: 1.5; margin: 0 auto 10px; display: block; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login">
  <div class="login-logo">
    <svg viewBox="0 0 24 24"><path d="M8 6v6m0 0v6m0-6h8M8 12H4"/><rect x="2" y="3" width="20" height="18" rx="3"/></svg>
  </div>
  <div class="login-title">Turno Concilia</div>
  <div class="login-sub">Residencia Santa Llúcia · Dénia</div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="login-email" placeholder="tu@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input class="form-input" type="password" id="login-pass" placeholder="••••••••">
  </div>
  <button class="btn-primary" onclick="doLogin()">Entrar</button>

  <div class="login-demo">
    <div style="margin-bottom:6px">— Acceso demo (pulse para entrar) —</div>
    <div class="demo-users">
      <button class="demo-btn" onclick="loginDemo('superadmin')">
        <span class="demo-badge" style="background:#EEEDFE;color:#3C3489">Superadmin</span>
        Admin General
      </button>
      <button class="demo-btn" onclick="loginDemo('coordinadora')">
        <span class="demo-badge" style="background:#E1F5EE;color:#085041">Coordinadora</span>
        Coordinadora de turno
      </button>
      <button class="demo-btn" onclick="loginDemo('auxiliar')">
        <span class="demo-badge" style="background:#FAEEDA;color:#633806">Auxiliar</span>
        INMA SOLER
      </button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Turno Concilia</div>
      <div class="topbar-sub" id="topbar-sub">Residencia Santa Llúcia</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- CUADRANTE -->
  <div class="page active" id="page-cuadrante">
    <div class="mes-nav">
      <button onclick="cambiarMes(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="mes-titulo" id="mes-titulo"></span>
      <button onclick="cambiarMes(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="leyenda">
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#E1F5EE;border:1px solid #1D9E75"></div>Mañana res.</div>
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#EAF3DE;border:1px solid #3B6D11"></div>Mañana CD</div>
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#FAEEDA;border:1px solid #BA7517"></div>Tarde res.</div>
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#FBEAF0;border:1px solid #993556"></div>Tarde CD</div>
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#EEEDFE;border:1px solid #534AB7"></div>Noche</div>
      <div class="leyenda-item"><div class="leyenda-dot" style="background:#FCEBEB;border:1px solid #A32D2D"></div>HE/IT</div>
    </div>
    <div class="cuadrante-wrap">
      <table class="cuadrante-tabla" id="cuadrante-tabla"></table>
    </div>
  </div>

  <!-- SERVICIOS MÍNIMOS -->
  <div class="page" id="page-sm">
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Plantilla efectiva hoy
      </div>
      <div id="sm-hoy"></div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Esta semana
      </div>
      <div id="sm-semana"></div>
    </div>
  </div>

  <!-- SOLICITUDES -->
  <div class="page" id="page-solicitudes">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchSolTab('pendientes',this)">Pendientes</button>
      <button class="tab-btn" onclick="switchSolTab('mis',this)">Mis solicitudes</button>
      <button class="tab-btn" onclick="switchSolTab('nueva',this)">+ Nueva</button>
    </div>
    <div id="sol-pendientes"></div>
    <div id="sol-mis" style="display:none"></div>
    <div id="sol-nueva" style="display:none">
      <div class="card">
        <div class="form-group">
          <label class="form-label">Tipo de solicitud</label>
          <select class="form-input" id="sol-tipo">
            <option value="cambio">Cambio de turno</option>
            <option value="AP">Asunto propio (AP)</option>
            <option value="P">Permiso (P)</option>
            <option value="VAC">Vacaciones</option>
            <option value="DH">Devolución de horas (DH)</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group">
            <label class="form-label">Fecha inicio</label>
            <input type="date" class="form-input" id="sol-fecha-ini">
          </div>
          <div class="form-group">
            <label class="form-label">Fecha fin</label>
            <input type="date" class="form-input" id="sol-fecha-fin">
          </div>
        </div>
        <div class="form-group" id="sol-contraparte-wrap">
          <label class="form-label">Compañera (para cambios)</label>
          <select class="form-input" id="sol-contraparte">
            <option value="">Selecciona compañera...</option>
            <option>ANA GARCIA</option>
            <option>XIMO</option>
            <option>MARIBEL SOBRECA</option>
            <option>REME BRIONES</option>
            <option>MARISA</option>
            <option>SILVIA</option>
            <option>TERE GRAU</option>
            <option>ERIKA</option>
            <option>NORMA</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Motivo (opcional)</label>
          <input type="text" class="form-input" id="sol-motivo" placeholder="Describe el motivo si lo deseas">
        </div>
        <button class="btn-primary" onclick="enviarSolicitud()">Enviar solicitud</button>
      </div>
    </div>
  </div>

  <!-- PERFIL / HE -->
  <div class="page" id="page-perfil">
    <div class="card">
      <div class="perfil-header">
        <div class="perfil-avatar" id="perfil-avatar"></div>
        <div>
          <div class="perfil-nombre" id="perfil-nombre"></div>

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEMANA = ['D','L','M','X','J','V','S'];

let currentUser = null;
let mesActual = 0;
let anioActual = 2026;

function doLogin() {
  const email = document.getElementById('login-email').value;
  if (email.includes('admin')) loginDemo('superadmin');
  else if (email.includes('coord')) loginDemo('coordinadora');
  else loginDemo('auxiliar');
}

function loginDemo(tipo) {
  currentUser = { ...USUARIOS[tipo], tipo };
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  document.getElementById('topbar-user').textContent = currentUser.nick;
  cargarPerfil();
  renderCuadrante();
  renderSM();
  renderSolicitudes();
  renderNotificaciones();
}

function doLogout() {
  currentUser = null;
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
}

function showPage(nombre) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + nombre).classList.add('active');
  document.getElementById('nav-' + nombre).classList.add('active');
}

function cambiarMes(delta) {
  mesActual += delta;
  if (mesActual < 0) { mesActual = 11; anioActual--; }
  if (mesActual > 11) { mesActual = 0; anioActual++; }
  renderCuadrante();
}

function diasEnMes(mes, anio) { return new Date(anio, mes + 1, 0).getDate(); }
function diaSemana(anio, mes, dia) { return new Date(anio, mes, dia).getDay(); }
function esFinde(anio, mes, dia) { const d = diaSemana(anio, mes, dia); return d === 0 || d === 6; }

function renderCuadrante() {
  document.getElementById('mes-titulo').textContent = MESES[mesActual] + ' ' + anioActual;
  const total = diasEnMes(mesActual, anioActual);
  const tabla = document.getElementById('cuadrante-tabla');
  const hoy = new Date();
  const esHoy = (d) => hoy.getFullYear() === anioActual && hoy.getMonth() === mesActual && hoy.getDate() === d;

  let html = '<thead><tr><th class="col-nombre">Auxiliar</th>';
  for (let d = 1; d <= total; d++) {
    const ds = diaSemana(anioActual, mesActual, d);
    const dsLabel = DIAS_SEMANA[ds];
    const finde = esFinde(anioActual, mesActual, d);
    html += `<th class="${finde ? 'col-findes' : ''} ${esHoy(d) ? 'col-hoy' : ''}">${dsLabel}<br>${d}</th>`;
  }
  html += '</tr></thead><tbody>';

  const data = mesActual === 0 ? ENERO_DATA : {};
  AUXILIARES.forEach(nombre => {
    const esMia = currentUser && currentUser.nick === nombre;
    html += `<tr${esMia ? ' class="fila-propia"' : ''}>`;
    html += `<td class="nombre-cel">${nombre}</td>`;
    for (let d = 1; d <= total; d++) {
      const turnos = data[nombre];
      const cod = turnos ? (turnos[d-1] || '') : '';
      const cls = claseColor(cod);
      const finde = esFinde(anioActual, mesActual, d);
      html += `<td class="${finde ? 'col-findes' : ''} ${esHoy(d) ? 'col-hoy' : ''}">`;
      if (cod) html += `<span class="turno-pill ${cls}">${cod}</span>`;
      html += `</td>`;
    }
    html += '</tr>';
  });

  html += '</tbody>';
  tabla.innerHTML = html;
}

function renderSM() {
  const hoy = new Date();
  const diasSem = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const esFinde = [0,6].includes(hoy.getDay());
  const smM = esFinde ? 8 : 11;
  const smT = esFinde ? 6 : 7;
  const smN = 1;

  const plantillaM = esFinde ? 8 : 12;
  const plantillaT = esFinde ? 6 : 7;

  function filaEstado(lbl, efectiva, minimo) {
    const ok = efectiva >= minimo;
    const cls = ok ? 'estado-ok' : 'estado-red';
    const dot = ok ? 'dot-ok' : 'dot-red';
    return `<div class="sm-row">
      <span><span class="${dot}"></span>${lbl}</span>
      <span class="sm-num ${cls}">${efectiva}/${minimo}</span>
    </div>`;
  }

  document.getElementById('sm-hoy').innerHTML = `
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">${diasSem[hoy.getDay()]}, ${hoy.getDate()} de ${MESES[hoy.getMonth()]}</div>
    ${filaEstado('Mañana', plantillaM, smM)}
    ${filaEstado('Tarde', plantillaT, smT)}
    ${filaEstado('Noche', 1, smN)}
  `;

  let semanaHtml = '';
  for (let i = 0; i < 7; i++) {
    const fecha = new Date(hoy); fecha.setDate(hoy.getDate() + i);
    const fe = [0,6].includes(fecha.getDay());
    const mMin = fe ? 8 : 11; const tMin = fe ? 6 : 7;
    const mEf = fe ? 8 : 12; const tEf = fe ? 6 : 7;
    const okM = mEf >= mMin; const okT = tEf >= tMin;
    semanaHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <span>${diasSem[fecha.getDay()].slice(0,3)} ${fecha.getDate()}</span>
      <span>
        <span class="${okM ? 'estado-ok' : 'estado-red'}" style="margin-right:8px">M ${mEf}/${mMin}</span>
        <span class="${okT ? 'estado-ok' : 'estado-red'}" style="margin-right:8px">T ${tEf}/${tMin}</span>
        <span class="estado-ok">N 1/1</span>
      </span>
    </div>`;
  }
  document.getElementById('sm-semana').innerHTML = semanaHtml;
}

      </div>

  if (!html) html = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Sin solicitudes pendientes</div>';

  let miHtml = '';

  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('sol-fecha-ini').value = hoy;
  document.getElementById('sol-fecha-fin').value = hoy;
}

function resolverSol(i, estado) {
  solicitudesDemo[i].estado = estado;

function switchSolTab(tab, btn) {
